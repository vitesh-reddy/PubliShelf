name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  client-checks:
    name: Client Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: |
          mkdir -p ../artifacts
          npm test -- --ci --runInBand --json --outputFile=../artifacts/client-test-report.json

      - name: Build
        run: npm run build

      - name: Upload client test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-report
          path: artifacts/client-test-report.json
          if-no-files-found: warn

  server-checks:
    name: Server Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 1h
        run: |
          mkdir -p ../artifacts
          npm test -- --json --outputFile=../artifacts/server-test-report.json

      - name: Upload server test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: artifacts/server-test-report.json
          if-no-files-found: warn

  ci-report:
    name: CI Report
    runs-on: ubuntu-latest
    needs:
      - client-checks
      - server-checks
    if: always()

    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate markdown report
        env:
          CLIENT_RESULT: ${{ needs.client-checks.result }}
          SERVER_RESULT: ${{ needs.server-checks.result }}
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const read=(p)=>{ try { return JSON.parse(fs.readFileSync(p,'utf8')); } catch { return null; } }; const c=read('artifacts/client-test-report/client-test-report.json'); const s=read('artifacts/server-test-report/server-test-report.json'); const line=(label,data)=> data ? '- '+label+': '+data.numPassedTests+'/'+data.numTotalTests+' passed, '+data.numFailedTests+' failed' : '- '+label+': report missing'; const md=['# CI Report','','## Job Statuses','- Client checks: '+process.env.CLIENT_RESULT,'- Server checks: '+process.env.SERVER_RESULT,'','## Test Summary',line('Client tests',c),line('Server tests',s),'','## Metadata','- Commit SHA: '+process.env.GITHUB_SHA,'- Branch/Ref: '+process.env.GITHUB_REF,'- Workflow Run: '+process.env.GITHUB_RUN_ID].join('\n'); fs.writeFileSync('ci-report.md',md);"

      - name: Publish job summary
        run: cat ci-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-report.md

      - name: Fail when checks fail
        if: needs.client-checks.result != 'success' || needs.server-checks.result != 'success'
        run: exit 1
